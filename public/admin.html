<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Pointage JRV</title>
  <link rel="stylesheet" href="/assets/bootstrap.min.css">
</head>
<body class="bg-light py-4 px-3">
<main class="mx-auto" style="max-width:680px">
  <h1 class="h4 mb-4">Administration — Pointage JRV</h1>

  <div id="feedback" class="alert d-none" role="alert"></div>

  <!-- Auth -->
  <div id="auth-section" class="card mb-4">
    <div class="card-body">
      <label for="token" class="form-label">Mot de passe administrateur</label>
      <input id="token" type="password" class="form-control mb-3" placeholder="Token">
      <button class="btn btn-primary" id="btn-login">Connexion</button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="d-none">
    <div class="mb-3">
      <label for="session" class="form-label">Séance</label>
      <select id="session" class="form-select"></select>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-secondary small" id="count"></span>

      <!-- Export dropdown -->
      <div class="btn-group">
        <button class="btn btn-outline-secondary btn-sm" id="btn-export">Exporter</button>
        <button class="btn btn-outline-secondary btn-sm dropdown-toggle dropdown-toggle-split"
                id="export-dropdown-toggle" aria-expanded="false">
          <span class="visually-hidden">Choisir le format</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" id="export-menu">
          <li><a class="dropdown-item active" href="#" data-format="csv">CSV</a></li>
          <li><a class="dropdown-item" href="#" data-format="json">JSON</a></li>
          <li><a class="dropdown-item" href="#" data-format="grist">Grist</a></li>
        </ul>
      </div>
    </div>

    <table class="table table-bordered table-hover bg-white rounded shadow-sm">
      <thead class="table-light">
        <tr>
          <th>Pseudonyme</th>
          <th>Heure</th>
          <th>Pointé par</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
  let token  = '';
  let format = 'csv';

  const authFetch = (path, opts = {}) => fetch(path, {
    ...opts,
    headers: { ...(opts.headers ?? {}), Authorization: `Bearer ${token}` },
  });
  const authGet  = path => authFetch(path).then(r => r.json());
  const authPost = (path, data) => authFetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).then(r => r.json());

  function showFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = `alert alert-${type === 'success' ? 'success' : 'danger'}`;
    setTimeout(() => el.classList.add('d-none'), 4000);
  }

  function formatSession(s) {
    const d = new Date(s.start);
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })
      + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
      + (s.title ? ` — ${s.title}` : '');
  }

  function renderCheckins(checkins) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    document.getElementById('count').textContent = `${checkins.length} présence(s)`;
    checkins.forEach(c => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${c.nickname}</td>
        <td>${new Date(c.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</td>
        <td>${c.checked_in_by ?? '—'}</td>
        <td class="text-end">
          <button class="btn btn-outline-danger btn-sm" data-id="${c.id}">Supprimer</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function loadCheckins() {
    const uid = document.getElementById('session').value;
    if (!uid) return;
    authGet(`/api/admin/checkins.php?session_uid=${encodeURIComponent(uid)}`)
      .then(({ checkins = [] }) => renderCheckins(checkins));
  }

  // Login
  document.getElementById('btn-login').addEventListener('click', async () => {
    token = document.getElementById('token').value.trim();
    const { sessions = [] } = await fetch('/api/sessions.php').then(r => r.json());

    if (sessions.length > 0) {
      const test = await authGet(`/api/admin/checkins.php?session_uid=${encodeURIComponent(sessions[0].uid)}`);
      if (!test.ok) { showFeedback('Token invalide.', 'error'); token = ''; return; }
    }

    const sel = document.getElementById('session');
    sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.uid;
      opt.textContent = formatSession(s);
      if (s.is_current) opt.selected = true;
      sel.appendChild(opt);
    });

    document.getElementById('auth-section').classList.add('d-none');
    document.getElementById('app').classList.remove('d-none');
    loadCheckins();
  });

  document.getElementById('session').addEventListener('change', loadCheckins);

  // Delete
  document.getElementById('tbody').addEventListener('click', async e => {
    const btn = e.target.closest('[data-id]');
    if (!btn) return;
    if (!confirm('Supprimer cette entrée ?')) return;
    const res = await authPost('/api/admin/delete.php', { checkin_id: btn.dataset.id });
    if (res.ok) {
      btn.closest('tr').remove();
      const count = document.getElementById('count');
      count.textContent = count.textContent.replace(/\d+/, n => n - 1);
    } else {
      showFeedback(res.error || 'Erreur.', 'error');
    }
  });

  // Export dropdown — vanilla JS toggle (no Bootstrap JS needed)
  const toggle = document.getElementById('export-dropdown-toggle');
  const menu   = document.getElementById('export-menu');

  toggle.addEventListener('click', e => {
    e.stopPropagation();
    const open = menu.classList.toggle('show');
    toggle.setAttribute('aria-expanded', open);
  });

  document.addEventListener('click', () => {
    menu.classList.remove('show');
    toggle.setAttribute('aria-expanded', false);
  });

  menu.addEventListener('click', e => {
    const item = e.target.closest('[data-format]');
    if (!item) return;
    e.preventDefault();
    menu.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    format = item.dataset.format;
    document.getElementById('btn-export').textContent = `Exporter ${format.toUpperCase()}`;
    menu.classList.remove('show');
    toggle.setAttribute('aria-expanded', false);
  });

  // Export — fetch with auth header → blob download
  document.getElementById('btn-export').addEventListener('click', async () => {
    const uid = document.getElementById('session').value;
    if (!uid) return;
    const url = `/api/admin/checkins.php?session_uid=${encodeURIComponent(uid)}&format=${format}`;
    const res = await authFetch(url);
    if (!res.ok) { showFeedback('Erreur lors de l\'export.', 'error'); return; }
    const blob = await res.blob();
    const ext  = format === 'csv' ? 'csv' : 'json';
    const a    = Object.assign(document.createElement('a'), {
      href:     URL.createObjectURL(blob),
      download: `presences-${uid.slice(0, 20)}.${ext}`,
    });
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
