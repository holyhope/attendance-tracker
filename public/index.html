<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pointage JRV</title>
  <link rel="stylesheet" href="/assets/bootstrap.min.css">
  <style>
    body { background: #f9fafb; }
    /* Mode-based visibility handled via JS + d-none */
  </style>
</head>
<body class="py-4 px-3">
<main class="card mx-auto" style="max-width:420px">
  <div class="card-body">
    <h1 class="h4 mb-4" data-i18n="title"></h1>

    <div id="feedback" class="alert d-none" role="alert"></div>

    <div class="mb-3">
      <label for="session" class="form-label" data-i18n="session_label"></label>
      <select id="session" class="form-select"></select>
    </div>

    <!-- Self mode -->
    <div id="self-section">
      <div class="mb-3">
        <label for="nickname" class="form-label" data-i18n="nickname_label"></label>
        <input id="nickname" type="text" class="form-control" autocomplete="off" list="suggestions">
        <datalist id="suggestions"></datalist>
      </div>
      <div class="form-check mb-3">
        <input id="remember" type="checkbox" class="form-check-input">
        <label for="remember" class="form-check-label" data-i18n="remember"></label>
      </div>
      <div class="d-grid gap-2">
        <button class="btn btn-primary" id="btn-self" data-i18n="btn_self"></button>
        <button class="btn btn-outline-primary" id="btn-proxy-toggle" data-i18n="btn_proxy_toggle"></button>
      </div>
    </div>

    <!-- Proxy mode -->
    <div id="proxy-section" class="d-none">
      <div class="mb-3">
        <label for="proxy-nickname" class="form-label" data-i18n="proxy_label"></label>
        <input id="proxy-nickname" type="text" class="form-control" autocomplete="off" list="proxy-suggestions">
        <datalist id="proxy-suggestions"></datalist>
      </div>
      <div class="d-grid gap-2">
        <button class="btn btn-primary" id="btn-proxy" data-i18n="btn_proxy"></button>
        <button class="btn btn-outline-secondary" id="btn-back" data-i18n="btn_back"></button>
      </div>
    </div>
  </div>
</main>

<script>
  // --- i18n ---
  const translations = {
    fr: {
      title:           "Pointage JRV",
      session_label:   "Séance",
      nickname_label:  "Votre pseudonyme",
      nickname_ph:     "Pseudo",
      remember:        "Mémoriser mon pseudonyme",
      btn_self:        "Pointer ma présence",
      btn_proxy_toggle:"Pointer quelqu'un d'autre",
      proxy_label:     "Pseudonyme de la personne",
      proxy_ph:        "Pseudo",
      btn_proxy:       "Valider la présence",
      btn_back:        "Retour",
      checked_in:      name => `Présence enregistrée pour ${name}.`,
      fill_nickname:   "Entrez votre pseudonyme.",
      fill_proxy:      "Entrez le pseudonyme de la personne.",
      already:         "Déjà pointé pour cette séance.",
      err_generic:     "Une erreur est survenue.",
    },
    en: {
      title:           "JRV Attendance",
      session_label:   "Session",
      nickname_label:  "Your nickname",
      nickname_ph:     "Nickname",
      remember:        "Remember my nickname",
      btn_self:        "Check in",
      btn_proxy_toggle:"Check someone else in",
      proxy_label:     "Person's nickname",
      proxy_ph:        "Nickname",
      btn_proxy:       "Confirm check-in",
      btn_back:        "Back",
      checked_in:      name => `Checked in: ${name}.`,
      fill_nickname:   "Enter your nickname.",
      fill_proxy:      "Enter the person's nickname.",
      already:         "Already checked in for this session.",
      err_generic:     "An error occurred.",
    },
  };

  const lang = (navigator.language || 'fr').slice(0, 2);
  const t    = translations[lang] ?? translations.fr;

  document.documentElement.lang = lang;
  document.title = t.title;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (typeof t[key] === 'string') el.textContent = t[key];
  });
  document.getElementById('nickname').placeholder       = t.nickname_ph;
  document.getElementById('proxy-nickname').placeholder = t.proxy_ph;

  // --- Helpers ---
  const get  = path => fetch(path).then(r => r.json());
  const post = (path, data) => fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).then(r => r.json());

  function showFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = `alert alert-${type === 'success' ? 'success' : 'danger'}`;
    setTimeout(() => el.classList.add('d-none'), 4000);
  }

  function formatSession(s) {
    const d = new Date(s.start);
    return d.toLocaleDateString(navigator.language, {
      weekday: 'long', day: 'numeric', month: 'long',
    }) + ' ' + d.toLocaleTimeString(navigator.language, {
      hour: '2-digit', minute: '2-digit',
    }) + (s.title ? ` — ${s.title}` : '');
  }

  // --- Saved nickname ---
  const NICKNAME_KEY = 'jrv_nickname';
  const saved = localStorage.getItem(NICKNAME_KEY);
  if (saved) {
    document.getElementById('nickname').value = saved;
    document.getElementById('remember').checked = true;
  }

  // --- Sessions ---
  get('/api/sessions.php').then(({ sessions = [] }) => {
    const sel = document.getElementById('session');
    sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.uid;
      opt.textContent = formatSession(s);
      if (s.is_current) opt.selected = true;
      sel.appendChild(opt);
    });
  });

  // --- Autocomplete ---
  function autocomplete(inputId, datalistId) {
    let timer;
    document.getElementById(inputId).addEventListener('input', ({ target }) => {
      clearTimeout(timer);
      if (target.value.trim().length < 2) return;
      timer = setTimeout(() => {
        get(`/api/attendees.php?q=${encodeURIComponent(target.value.trim())}`)
          .then(({ attendees = [] }) => {
            const dl = document.getElementById(datalistId);
            dl.innerHTML = '';
            attendees.forEach(({ nickname }) => {
              const opt = document.createElement('option');
              opt.value = nickname;
              dl.appendChild(opt);
            });
          });
      }, 200);
    });
  }
  autocomplete('nickname', 'suggestions');
  autocomplete('proxy-nickname', 'proxy-suggestions');

  // Uncheck "remember" if nickname diverges from saved value
  document.getElementById('nickname').addEventListener('input', ({ target }) => {
    const checkbox = document.getElementById('remember');
    if (checkbox.checked && target.value.trim() !== (localStorage.getItem(NICKNAME_KEY) ?? '')) {
      checkbox.checked = false;
    }
  });

  // --- Mode toggle ---
  function setMode(mode) {
    document.getElementById('self-section').classList.toggle('d-none', mode === 'proxy');
    document.getElementById('proxy-section').classList.toggle('d-none', mode === 'self');
    if (mode === 'proxy') document.getElementById('proxy-nickname').focus();
  }

  document.getElementById('btn-proxy-toggle').addEventListener('click', () => setMode('proxy'));
  document.getElementById('btn-back').addEventListener('click', () => {
    document.getElementById('proxy-nickname').value = '';
    setMode('self');
  });

  // --- Self check-in ---
  document.getElementById('btn-self').addEventListener('click', async () => {
    const nickname = document.getElementById('nickname').value.trim();
    if (!nickname) { showFeedback(t.fill_nickname, 'error'); return; }
    const res = await post('/api/checkin.php', {
      session_uid: document.getElementById('session').value,
      nickname,
    });
    if (res.ok) {
      if (document.getElementById('remember').checked) localStorage.setItem(NICKNAME_KEY, nickname);
      showFeedback(t.checked_in(res.nickname), 'success');
      document.getElementById('nickname').value = '';
    } else if (res.error?.includes('Already')) {
      showFeedback(t.already, 'error');
    } else {
      showFeedback(t.err_generic, 'error');
    }
  });

  // --- Proxy check-in ---
  document.getElementById('btn-proxy').addEventListener('click', async () => {
    const nickname = document.getElementById('proxy-nickname').value.trim();
    if (!nickname) { showFeedback(t.fill_proxy, 'error'); return; }
    const res = await post('/api/checkin.php', {
      session_uid: document.getElementById('session').value,
      nickname,
    });
    if (res.ok) {
      showFeedback(t.checked_in(res.nickname), 'success');
      document.getElementById('proxy-nickname').value = '';
      setMode('self');
    } else if (res.error?.includes('Already')) {
      showFeedback(t.already, 'error');
    } else {
      showFeedback(t.err_generic, 'error');
    }
  });
</script>
</body>
</html>
