<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pointage JRV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9fafb; min-height: 100dvh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    main { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    h1 { font-size: 1.4rem; margin-bottom: 1.75rem; color: #111; }
    label { display: block; font-size: .875rem; font-weight: 500; color: #374151; margin-bottom: .375rem; }
    input, select {
      width: 100%; padding: .75rem 1rem; font-size: 1rem;
      border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 1.25rem;
      background: white; color: #111; appearance: none;
    }
    input:focus, select:focus { outline: 2px solid #2563eb; border-color: transparent; }
    .btn {
      display: block; width: 100%; padding: .875rem;
      font-size: 1rem; font-weight: 500; border-radius: 8px;
      cursor: pointer; border: none; transition: background .15s;
    }
    .btn-primary   { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: white; color: #2563eb; border: 1.5px solid #2563eb; margin-top: .75rem; }
    .btn-secondary:hover { background: #eff6ff; }
    #feedback { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: .9rem; display: none; }
    .success { background: #dcfce7; color: #166534; }
    .error   { background: #fee2e2; color: #991b1b; }

    /* Mode-based visibility */
    [data-mode="self"]  .proxy-only { display: none; }
    [data-mode="proxy"] .self-only  { display: none; }
  </style>
</head>
<body>
<main data-mode="self">
  <h1 data-i18n="title"></h1>

  <div id="feedback"></div>

  <label for="session" data-i18n="session_label"></label>
  <select id="session"></select>

  <!-- Self mode only -->
  <div class="self-only">
    <label for="nickname" data-i18n="nickname_label"></label>
    <input id="nickname" type="text" autocomplete="off" list="suggestions">
    <datalist id="suggestions"></datalist>
    <button class="btn btn-primary self-only" id="btn-self" data-i18n="btn_self"></button>
    <button class="btn btn-secondary self-only" id="btn-proxy-toggle" data-i18n="btn_proxy_toggle"></button>
  </div>

  <!-- Proxy mode only -->
  <div class="proxy-only">
    <label for="proxy-nickname" data-i18n="proxy_label"></label>
    <input id="proxy-nickname" type="text" autocomplete="off" list="proxy-suggestions">
    <datalist id="proxy-suggestions"></datalist>
    <button class="btn btn-primary" id="btn-proxy" data-i18n="btn_proxy"></button>
    <button class="btn btn-secondary" id="btn-back" data-i18n="btn_back"></button>
  </div>
</main>

<script>
  // --- i18n ---
  const translations = {
    fr: {
      title:           "Pointage JRV",
      session_label:   "Séance",
      nickname_label:  "Votre pseudonyme",
      nickname_ph:     "Pseudo",
      btn_self:        "Pointer ma présence",
      btn_proxy_toggle:"Pointer quelqu'un d'autre",
      proxy_label:     "Pseudonyme de la personne",
      proxy_ph:        "Pseudo",
      btn_proxy:       "Valider la présence",
      btn_back:        "Retour",
      checked_in:      name => `Présence enregistrée pour ${name}.`,
      fill_nickname:   "Entrez votre pseudonyme.",
      fill_proxy:      "Entrez le pseudonyme de la personne.",
      already:         "Déjà pointé pour cette séance.",
      err_generic:     "Une erreur est survenue.",
    },
    en: {
      title:           "JRV Attendance",
      session_label:   "Session",
      nickname_label:  "Your nickname",
      nickname_ph:     "Nickname",
      btn_self:        "Check in",
      btn_proxy_toggle:"Check someone else in",
      proxy_label:     "Person's nickname",
      proxy_ph:        "Nickname",
      btn_proxy:       "Confirm check-in",
      btn_back:        "Back",
      checked_in:      name => `Checked in: ${name}.`,
      fill_nickname:   "Enter your nickname.",
      fill_proxy:      "Enter the person's nickname.",
      already:         "Already checked in for this session.",
      err_generic:     "An error occurred.",
    },
  };

  const lang = (navigator.language || 'fr').slice(0, 2);
  const t    = translations[lang] ?? translations.fr;

  document.documentElement.lang = lang;
  document.title = t.title;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (typeof t[key] === 'string') el.textContent = t[key];
  });
  document.getElementById('nickname').placeholder       = t.nickname_ph;
  document.getElementById('proxy-nickname').placeholder = t.proxy_ph;

  // --- Helpers ---
  const main = document.querySelector('main');
  const get  = path => fetch(path).then(r => r.json());
  const post = (path, data) => fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).then(r => r.json());

  function showFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  function formatSession(s) {
    const d = new Date(s.start);
    return d.toLocaleDateString(navigator.language, {
      weekday: 'long', day: 'numeric', month: 'long',
    }) + ' ' + d.toLocaleTimeString(navigator.language, {
      hour: '2-digit', minute: '2-digit',
    }) + (s.title ? ` — ${s.title}` : '');
  }

  // --- Sessions ---
  get('/api/sessions.php').then(({ sessions = [] }) => {
    const sel = document.getElementById('session');
    sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.uid;
      opt.textContent = formatSession(s);
      if (s.is_current) opt.selected = true;
      sel.appendChild(opt);
    });
  });

  // --- Autocomplete ---
  function autocomplete(inputId, datalistId) {
    let timer;
    document.getElementById(inputId).addEventListener('input', ({ target }) => {
      clearTimeout(timer);
      if (target.value.trim().length < 2) return;
      timer = setTimeout(() => {
        get(`/api/attendees.php?q=${encodeURIComponent(target.value.trim())}`)
          .then(({ attendees = [] }) => {
            const dl = document.getElementById(datalistId);
            dl.innerHTML = '';
            attendees.forEach(({ nickname }) => {
              const opt = document.createElement('option');
              opt.value = nickname;
              dl.appendChild(opt);
            });
          });
      }, 200);
    });
  }
  autocomplete('nickname', 'suggestions');
  autocomplete('proxy-nickname', 'proxy-suggestions');

  // --- Self check-in ---
  document.getElementById('btn-self').addEventListener('click', async () => {
    const nickname = document.getElementById('nickname').value.trim();
    if (!nickname) { showFeedback(t.fill_nickname, 'error'); return; }
    const res = await post('/api/checkin.php', {
      session_uid: document.getElementById('session').value,
      nickname,
    });
    if (res.ok) {
      showFeedback(t.checked_in(res.nickname), 'success');
      document.getElementById('nickname').value = '';
    } else if (res.error?.includes('Already')) {
      showFeedback(t.already, 'error');
    } else {
      showFeedback(t.err_generic, 'error');
    }
  });

  // --- Mode toggle ---
  document.getElementById('btn-proxy-toggle').addEventListener('click', () => {
    main.dataset.mode = 'proxy';
    document.getElementById('proxy-nickname').focus();
  });

  document.getElementById('btn-back').addEventListener('click', () => {
    main.dataset.mode = 'self';
    document.getElementById('proxy-nickname').value = '';
  });

  // --- Proxy check-in ---
  document.getElementById('btn-proxy').addEventListener('click', async () => {
    const nickname = document.getElementById('proxy-nickname').value.trim();
    if (!nickname) { showFeedback(t.fill_proxy, 'error'); return; }
    const res = await post('/api/checkin.php', {
      session_uid: document.getElementById('session').value,
      nickname,
    });
    if (res.ok) {
      showFeedback(t.checked_in(res.nickname), 'success');
      document.getElementById('proxy-nickname').value = '';
      main.dataset.mode = 'self';
    } else if (res.error?.includes('Already')) {
      showFeedback(t.already, 'error');
    } else {
      showFeedback(t.err_generic, 'error');
    }
  });
</script>
</body>
</html>
