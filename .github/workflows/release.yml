name: Release & Deploy preprod

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build:css

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r public dist/www
          cp -r src dist/src
          cp .ovhconfig dist/.ovhconfig

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Zip dist
        run: cd dist && zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist.zip
          generate_release_notes: true

  deploy-preprod:
    needs: release
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_HOST }}
          port: ${{ vars.FTP_PORT }}
          username: ${{ vars.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
