name: Release & Deploy preprod

# Required in environment "preprod" (Settings → Environments → preprod):
#   Variables: FTP_HOST, FTP_PORT, FTP_USER, ASSOCIATION_NAME
#   Secrets:   FTP_PASSWORD, CALENDAR_URL

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r public dist/www
          cp -r src dist/src
          cp -r lang dist/lang
          cp .ovhconfig dist/.ovhconfig
          echo "<?php return '${GITHUB_REF_NAME}';" > dist/version.php

      - name: Generate screenshots
        run: |
          echo "::group::playwright install"
          npx playwright install chromium --with-deps
          echo "::endgroup::"
          npm run screenshots
          # Remove demo files from dist before packaging
          rm -f dist/config.php
          rm -rf dist/data dist/cache

      - name: Zip dist
        run: cd dist && zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist.zip
            screenshots/*.png
          generate_release_notes: true

      - name: Push screenshots to branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin screenshots 2>/dev/null || true

          if git show-ref --quiet refs/remotes/origin/screenshots; then
            git worktree add -b screenshots-deploy /tmp/sc remotes/origin/screenshots
          else
            git worktree add --orphan -b screenshots-deploy /tmp/sc
          fi

          cp screenshots/*.png /tmp/sc/
          cd /tmp/sc
          git add *.png
          git diff --cached --quiet || git commit -m "screenshots: ${{ github.ref_name }}"
          git push origin HEAD:screenshots

          cd $GITHUB_WORKSPACE
          git worktree remove --force /tmp/sc

  deploy-preprod:
    needs: release
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Download release asset
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "dist.zip" --repo ${{ github.repository }}
          unzip dist.zip -d dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject environment config
        run: |
          HTPASSWD_PATH="/home/${{ vars.FTP_USER }}/.htpasswd"
          sed -i "s|%%HTPASSWD_PATH%%|${HTPASSWD_PATH}|" dist/www/admin/.htaccess
          sed -i "s|%%HTPASSWD_PATH%%|${HTPASSWD_PATH}|" dist/www/api/admin/.htaccess
          ICON_URL='${{ vars.ICON_URL }}'
          ICON_LINE=''
          if [ -n "$ICON_URL" ]; then
            case "$ICON_URL" in
              http://*|https://*)
                EXT="${ICON_URL##*.}"
                LOCAL_ICON="/assets/icon-custom.${EXT}"
                curl -fsSL "$ICON_URL" -o "dist/www/assets/icon-custom.${EXT}"
                ICON_LINE="              'icon_url' => '$LOCAL_ICON',"
                ;;
              *)
                ICON_LINE="              'icon_url' => '$ICON_URL',"
                ;;
            esac
          fi
          SITE_URL='${{ vars.SITE_URL }}'
          SITE_LINE=''
          [ -n "$SITE_URL" ] && SITE_LINE="              'site_url' => '$SITE_URL',"
          CUSTOM_CSS_URL='${{ vars.CUSTOM_CSS_URL }}'
          CSS_LINE=''
          [ -n "$CUSTOM_CSS_URL" ] && CSS_LINE="              'custom_css_url' => '$CUSTOM_CSS_URL',"
          cat > dist/config.php << PHP
          <?php
          return [
              'association_name'     => '${{ vars.ASSOCIATION_NAME }}',
              'db_dsn'               => 'sqlite:' . __DIR__ . '/data/attendance.db',
              'cache_path'           => __DIR__ . '/cache/agenda.ics.cache',
              'calendar_url'         => '${{ secrets.CALENDAR_URL }}',
              'session_label_format' => '{date:EEEE d MMMM yyyy}',
              'show_location'        => 'with_map',
          $ICON_LINE
          $SITE_LINE
          $CSS_LINE
          ];
          PHP

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -c "
            open -u ${{ vars.FTP_USER }},${{ secrets.FTP_PASSWORD }} \
                 ftp://${{ vars.FTP_HOST }}:${{ vars.FTP_PORT }}
            mirror --reverse --delete --verbose \
                   --exclude '^data/' \
                   --exclude '^cache/' \
                   --exclude '^\.htpasswd$' \
                   dist/ /
          "
