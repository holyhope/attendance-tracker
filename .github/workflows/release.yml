name: Release & Deploy preprod

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build:css

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r public dist/www
          cp -r src dist/src
          cp .ovhconfig dist/.ovhconfig

      - name: Zip dist
        run: cd dist && zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist.zip
          generate_release_notes: true

  deploy-preprod:
    needs: release
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Download release asset
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "dist.zip" --repo ${{ github.repository }}
          unzip dist.zip -d dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject environment config
        run: |
          sed -i "s|%%HTPASSWD_PATH%%|/home/${{ vars.FTP_USER }}/.htpasswd|" dist/www/admin/.htaccess

      - name: Deploy via FTP
        run: |
          find dist -type f | sort | while IFS= read -r f; do
            rel="${f#dist/}"
            curl --silent --show-error --ftp-create-dirs \
                 --upload-file "$f" \
                 "ftp://${{ vars.FTP_USER }}:${{ secrets.FTP_PASSWORD }}@${{ vars.FTP_HOST }}:${{ vars.FTP_PORT }}/${rel}"
            echo "✓ ${rel}"
          done
