name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build:css

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r public dist/www
          cp -r src dist/src
          cp .ovhconfig dist/.ovhconfig

      - name: Zip dist
        run: cd dist && zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
          generate_release_notes: true
