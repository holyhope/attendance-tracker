name: Release & Deploy preprod

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: npm run lint
      - run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress
      - run: npm run build

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r public dist/www
          cp -r src dist/src
          cp -r lang dist/lang
          cp .ovhconfig dist/.ovhconfig

      - name: Zip dist
        run: cd dist && zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist.zip
          generate_release_notes: true

  deploy-preprod:
    needs: release
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Download release asset
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "dist.zip" --repo ${{ github.repository }}
          unzip dist.zip -d dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject environment config
        run: |
          HTPASSWD_PATH="/home/${{ vars.FTP_USER }}/.htpasswd"
          sed -i "s|%%HTPASSWD_PATH%%|${HTPASSWD_PATH}|" dist/www/admin/.htaccess
          sed -i "s|%%HTPASSWD_PATH%%|${HTPASSWD_PATH}|" dist/www/api/admin/.htaccess
          cat > dist/config.php << 'PHP'
          <?php
          return [
              'association_name'     => '${{ vars.ASSOCIATION_NAME }}',
              'db_dsn'               => 'sqlite:' . __DIR__ . '/data/attendance.db',
              'cache_path'           => __DIR__ . '/cache/agenda.ics.cache',
              'calendar_url'         => '${{ secrets.CALENDAR_URL }}',
              'session_label_format' => '{date} — {title}',
              'show_location'        => 'with_map',
          ];
          PHP

      - name: Deploy via FTP
        run: |
          find dist -type f | sort | while IFS= read -r f; do
            rel="${f#dist/}"
            curl --silent --show-error --ftp-create-dirs \
                 --upload-file "$f" \
                 "ftp://${{ vars.FTP_USER }}:${{ secrets.FTP_PASSWORD }}@${{ vars.FTP_HOST }}:${{ vars.FTP_PORT }}/${rel}"
            echo "✓ ${rel}"
          done
